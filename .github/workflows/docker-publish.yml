name: Devops Project

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # 🐍 Setup Python instead of Node
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 📦 Install dependencies
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install flask
          # if you have requirements.txt:
          # pip install -r requirements.txt
        working-directory: ./app

      # 🧪 Run tests (optional)
      - name: Run tests
        run: |
          pip install pytest
          pytest || true
        working-directory: ./app

      # 🔐 Docker login
      - name: Docker login
        run: echo ${{secrets.DOCKER_PASSWORD}} | docker login -u ${{secrets.DOCKER_USERNAME}} --password-stdin

      # 🏷️ Tag image
      - name: Docker Image Tag
        run: echo "TAG=${GITHUB_SHA::7}" >> $GITHUB_ENV

      # 🐳 Build Docker image
      - name: Docker build
        run: docker build -t ${{secrets.DOCKER_USERNAME}}/devops-azure:$TAG .
        working-directory: ./app

      # 🚀 Push image
      - name: Docker Push
        run: docker push ${{secrets.DOCKER_USERNAME}}/devops-azure:$TAG

      # 🧩 Update k8s manifest
      - name: Update image tag in k8s manifest
        run: |
          sed -i "s|image: .*|image: ${{secrets.DOCKER_USERNAME}}/devops-azure:${TAG}|" k8s/deployment.yaml

      # 📌 Commit changes
      - name: Commit updated manifest
        run: |
          git config user.name "bishalparikhh"
          git config user.email "parikhbishal@gmail.com"
          git add k8s/deployment.yaml
          git commit -m "deploy: update image tag to ${TAG}" || echo "No changes to commit"
          git push